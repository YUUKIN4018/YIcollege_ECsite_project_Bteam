spring.application.name=ecsite

####################################################
# PostgreSQL 用 DataSource 設定
####################################################
spring.datasource.url=jdbc:postgresql://localhost:5432/ecsite
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA（Hibernate）関連の設定
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# 初回はスキーマ自動生成を有効に。すでにテーブルを手動で作っていれば none にする
spring.jpa.hibernate.ddl-auto=update

# Hibernate が出力する SQL をログに出したい場合（任意）
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

####################################################
# Thymeleaf 設定
####################################################
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

####################################################
# サーバー設定
####################################################
server.port=8080

####################################################
# MyBatis 設定
####################################################
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration-location=classpath:mybatis-config.xml
